# Docker embedded DNS for service-name resolution (needed for `resolve` upstream servers).
resolver 127.0.0.11 ipv6=off valid=30s;

upstream backend_upstream {
    zone backend_upstream 64k;
    # Resolve service DNS at request-time so nginx can start even if backend is temporarily down/restarting.
    server backend:8000 resolve;
}

upstream frontend_upstream {
    zone frontend_upstream 64k;
    # Resolve service DNS at request-time so nginx can start even if frontend is temporarily down/restarting.
    server frontend:3000 resolve;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $cookie_algolab_access_token $api_limit_key {
    # 로그인 사용자는 JWT 쿠키 단위로 제한(시험장 NAT에서 동일 공인 IP 충돌 완화)
    default $cookie_algolab_access_token;
    # 비로그인/쿠키 없음은 기존처럼 IP 기준 fallback
    '' $binary_remote_addr;
}

server_tokens off;
server_names_hash_bucket_size 128;
client_body_timeout 120s;
client_header_timeout 120s;
send_timeout 120s;
proxy_hide_header X-Powered-By;

# 조회성 API(시험 페이지 초기 진입/폴링) 완화
# NAT 환경에서 한 공인 IP로 다수 학생이 묶이는 시험장 케이스를 고려:
# 로그인 사용자는 토큰 단위로, 비로그인 요청은 IP 단위로 제한한다.
limit_req_zone $api_limit_key zone=api_read_limit:10m rate=300r/s;
# 실행/제출 계열 API 별도 제한 (급격한 동시 제출 허용 폭 상향)
limit_req_zone $api_limit_key zone=api_write_limit:10m rate=80r/s;

gzip on;
gzip_vary on;
gzip_disable "msie6";
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/vnd.api+json
    image/svg+xml;

server {
    server_name example.com;
    client_max_body_size 50m;
    client_body_buffer_size 4m;

    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1h;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "TLS13+AESGCM+AES128:TLS13+AESGCM+AES256:EECDH+AESGCM:!aNULL:!MD5:!DSS";

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; worker-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net https://unpkg.com;" always;

    add_header X-Proxy-Cache-Status $upstream_cache_status always;

    # api

    # / 없는 요청에 대해 api/로 redirect
    location = /api {
        return 301 /api/;
    }

    location = /api/accounts/oauth/authorize {
        rewrite ^ /api/accounts/oauth/authorize/ last;
    }

    location = /api/accounts/oauth/authorize/ {
        client_max_body_size 50m;
        client_body_buffer_size 4m;
        proxy_pass http://backend_upstream/accounts/oauth/authorize/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_set_header Connection "";
    }

    location = /api/accounts/oauth/callback {
        rewrite ^ /api/accounts/oauth/callback/ last;
    }

    location = /api/accounts/oauth/callback/ {
        client_max_body_size 50m;
        client_body_buffer_size 4m;
        proxy_pass http://backend_upstream/accounts/oauth/callback/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_set_header Connection "";
    }

    location = /api/auth/user {
        rewrite ^ /api/auth/user/ last;
    }

    location = /api/auth/user/ {
        client_max_body_size 50m;
        client_body_buffer_size 4m;
        proxy_pass http://backend_upstream/api/auth/user/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_set_header Connection "";
    }

    location = /api/auth/me {
        rewrite ^ /api/auth/user/ last;
    }

    location = /api/auth/me/ {
        rewrite ^ /api/auth/user/ last;
    }

    location = /api/auth/session/ping {
        rewrite ^ /api/auth/session/ping/ last;
    }

    location = /api/auth/session/ping/ {
        client_max_body_size 50m;
        client_body_buffer_size 4m;
        proxy_pass http://backend_upstream/api/auth/session/ping/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_set_header Connection "";
    }

    location ^~ /api/auth/ {
        client_max_body_size 50m;
        client_body_buffer_size 4m;
        proxy_pass http://backend_upstream/api/auth/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_set_header Connection "";
    }

    location ^~ /api/v1/ {
        client_max_body_size 50m;
        client_body_buffer_size 4m;
        limit_req zone=api_read_limit burst=1000;
        proxy_pass http://backend_upstream/api/v1/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_set_header Connection "";
    }

    location ^~ /api/ {
        client_max_body_size 50m;
        client_body_buffer_size 4m;
        # 기본 API는 조회 트래픽을 기준으로 완화
        limit_req zone=api_read_limit burst=1000;
        proxy_pass http://frontend_upstream;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_set_header Connection "";
    }

    # 실행/제출(채점 요청) 계열은 별도 제한
    location ^~ /api/v1/instructor/execution/ {
        client_max_body_size 50m;
        client_body_buffer_size 4m;
        # nodelay를 제거해 극단적 동시 제출 시에도 즉시 429보다 짧은 대기 후 처리하도록 완충.
        limit_req zone=api_write_limit burst=400;
        proxy_pass http://backend_upstream/api/v1/instructor/execution/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_set_header Connection "";
    }

    # backend admmin
    location ^~ /admin/ {
        proxy_pass http://backend_upstream;
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # backend oauth
    location ^~ /oauth/ {
        proxy_pass http://backend_upstream;
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # static file 
    location /static/ {
        alias /var/www/algolab/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # frontend
    location / {
        try_files $uri $uri/ @frontend;
    }

    location @frontend {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name example.com;

    location /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
